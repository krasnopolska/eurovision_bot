services:
  bot:
    build: .
    image: eurovision-bot:latest
    container_name: eurovision-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/eurovision.db
    volumes:
      - eurovision-data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  eurovision-data:
